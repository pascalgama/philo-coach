<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Philo Coach — Bac Techno 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0C0C10;--bg2:#141419;--bg3:#1C1C24;--bg4:#25252F;
--t1:#EDEBE5;--t2:#A09E96;--t3:#6B6964;
--acc:#E8A849;--acc2:rgba(232,168,73,.12);--acc3:rgba(232,168,73,.25);
--ok:#4ADE80;--ok2:rgba(74,222,128,.12);
--err:#F87171;--err2:rgba(248,113,113,.12);
--purple:#A78BFA;--purple2:rgba(167,139,250,.12);
--teal:#5EEAD4;--teal2:rgba(94,234,212,.12);
--coral:#FB923C;--coral2:rgba(251,146,60,.12);
--blue:#60A5FA;--blue2:rgba(96,165,250,.12);
--pink:#F472B6;--pink2:rgba(244,114,182,.12);
--r:12px;--rs:8px;--rp:50px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;line-height:1.55;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:0;height:0}

.app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto}
.app-header{padding:16px 20px 0;text-align:center}
.app-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--t1)}
.app-logo span{color:var(--acc)}
.app-sub{font-size:11px;color:var(--t3);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

/* NAV TABS */
.nav{display:flex;gap:4px;padding:14px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:none;font-size:12px;font-weight:600;padding:8px 16px;border-radius:var(--rp);border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--t3);transition:all .2s;white-space:nowrap}
.nav-btn.on{background:var(--acc2);color:var(--acc);border-color:var(--acc3)}
.nav-btn:active{transform:scale(.96)}

/* CONTENT */
.view{display:none;flex:1;padding:16px;overflow-y:auto;padding-bottom:40px}
.view.on{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══════ FLASHCARDS ═══════ */
.fc-progress{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.fc-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.fc-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}
.fc-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t3)}
.fc-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.fc-ftag{font-size:11px;font-weight:600;padding:5px 12px;border-radius:var(--rp);border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--t3);transition:all .15s}
.fc-ftag.on{border-color:var(--acc3);color:var(--acc);background:var(--acc2)}

.card-wrap{perspective:800px;width:100%;aspect-ratio:3/4;max-height:420px;margin:0 auto 16px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);padding:28px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.card-front{background:var(--bg3);border:1px solid rgba(255,255,255,.06)}
.card-back{background:var(--bg4);border:1px solid rgba(255,255,255,.1);transform:rotateY(180deg)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;position:absolute;top:16px;left:20px}
.card-notion{font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--rp);position:absolute;top:14px;right:16px}
.card-author{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:8px}
.card-work{font-size:13px;color:var(--t2);font-style:italic}
.card-cite{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.4;margin-bottom:12px;color:var(--t1)}
.card-these{font-size:13px;color:var(--t2);line-height:1.6}
.card-hint{font-size:11px;color:var(--t3);position:absolute;bottom:16px}

.fc-btns{display:flex;gap:10px;justify-content:center}
.fc-btn{font-size:13px;font-weight:600;padding:10px 24px;border-radius:var(--rp);border:none;transition:all .15s}
.fc-btn:active{transform:scale(.95)}
.fc-prev{background:var(--bg3);color:var(--t2)}
.fc-next{background:var(--acc2);color:var(--acc)}
.fc-shuffle{background:var(--bg3);color:var(--t2);font-size:12px;padding:10px 16px}

/* ═══════ QUIZ ═══════ */
.quiz-intro{text-align:center;padding:40px 16px}
.quiz-intro h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.quiz-intro p{font-size:14px;color:var(--t2);margin-bottom:24px}
.quiz-start{font-size:14px;font-weight:600;padding:12px 32px;border-radius:var(--rp);border:none;background:var(--acc);color:var(--bg);transition:all .15s}
.quiz-start:active{transform:scale(.96)}

.q-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:24px 20px;margin-bottom:16px}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);margin-bottom:10px}
.q-text{font-size:15px;font-weight:600;line-height:1.45;margin-bottom:20px}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{text-align:left;font-size:14px;padding:12px 16px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.08);background:var(--bg3);color:var(--t1);transition:all .15s;line-height:1.4}
.q-opt:active{transform:scale(.98)}
.q-opt.correct{background:var(--ok2);border-color:var(--ok);color:var(--ok)}
.q-opt.wrong{background:var(--err2);border-color:var(--err);color:var(--err)}
.q-opt.dim{opacity:.45;pointer-events:none}
.q-explain{margin-top:14px;padding:14px;background:var(--bg4);border-radius:var(--rs);font-size:13px;color:var(--t2);line-height:1.6;display:none}
.q-explain.show{display:block;animation:fadeIn .2s ease}
.q-next{display:none;margin-top:14px;width:100%;font-size:13px;font-weight:600;padding:11px;border-radius:var(--rp);border:none;background:var(--acc2);color:var(--acc)}
.q-next.show{display:block}

.quiz-score{text-align:center;padding:40px 16px}
.score-circle{width:120px;height:120px;border-radius:50%;border:4px solid var(--acc);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.score-num{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--acc)}
.score-label{font-size:11px;color:var(--t3)}
.score-msg{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.score-detail{font-size:14px;color:var(--t2);margin-bottom:24px}

/* ═══════ MÉTHODE ═══════ */
.method-tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
.method-tabs::-webkit-scrollbar{display:none}
.mt-btn{flex:none;font-size:11px;font-weight:600;padding:7px 14px;border-radius:var(--rp);border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--t3);white-space:nowrap;transition:all .15s}
.mt-btn.on{background:var(--purple2);color:var(--purple);border-color:rgba(167,139,250,.3)}

.method-section{display:none}
.method-section.on{display:block;animation:fadeIn .2s ease}
.m-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:20px;margin-bottom:12px}
.m-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.m-step:last-child{margin-bottom:0}
.m-dot{flex:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.m-dot-1{background:var(--teal2);color:var(--teal)}
.m-dot-2{background:var(--coral2);color:var(--coral)}
.m-dot-3{background:var(--purple2);color:var(--purple)}
.m-dot-4{background:var(--acc2);color:var(--acc)}
.m-body h4{font-size:14px;font-weight:600;margin-bottom:4px}
.m-body p{font-size:13px;color:var(--t2);line-height:1.55}
.m-example{background:var(--bg4);border-left:3px solid var(--acc);border-radius:0 var(--rs) var(--rs) 0;padding:14px 16px;margin-top:10px;font-size:13px;color:var(--t2);line-height:1.6}
.m-example b{color:var(--acc);font-weight:600}
.m-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:var(--rs);margin-bottom:12px}
.m-warn{background:var(--err2);border:1px solid rgba(248,113,113,.2);border-radius:var(--rs);padding:12px 16px;margin-top:8px;font-size:13px;color:var(--err);line-height:1.55}

/* ═══════ SUJETS CORRIGÉS ═══════ */
.suj-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.suj-item{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .15s}
.suj-item:active{transform:scale(.98)}
.suj-item.on{border-color:var(--acc3)}
.suj-year{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);margin-bottom:4px}
.suj-title{font-size:14px;font-weight:600;line-height:1.35}
.suj-detail{display:none;animation:fadeIn .25s ease}
.suj-detail.on{display:block}
.suj-section{margin-top:20px}
.suj-section h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.suj-section h3::before{content:'';width:3px;height:14px;background:var(--acc);border-radius:2px}
.suj-part{background:var(--bg3);border-radius:var(--rs);padding:16px;margin-bottom:10px}
.suj-part-title{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.suj-part-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:none}
.sp1 .suj-part-num{background:var(--teal2);color:var(--teal)}
.sp2 .suj-part-num{background:var(--coral2);color:var(--coral)}
.sp3 .suj-part-num{background:var(--purple2);color:var(--purple)}
.suj-part p{font-size:13px;color:var(--t2);line-height:1.6}
.suj-part .ref{font-size:12px;color:var(--acc);margin-top:6px}
.suj-intro-ex,.suj-ccl-ex{background:var(--bg3);border-radius:var(--rs);padding:16px;font-size:13px;color:var(--t2);line-height:1.6;margin-top:8px}
.suj-intro-ex b,.suj-ccl-ex b{color:var(--t1);font-weight:600}
</style>
</head>
<body>

<div class="app">
<div class="app-header">
  <div class="app-logo">Philo <span>Coach</span></div>
  <div class="app-sub">Bac Techno 2026 — 10 ans de sujets (2016-2025)</div>
</div>

<nav class="nav" id="nav"></nav>

<!-- ═══════ VIEW: FLASHCARDS ═══════ -->
<div class="view on" id="v-flash">
  <div class="fc-filters" id="fc-filters"></div>
  <div class="fc-progress"><div class="fc-bar"><div class="fc-fill" id="fc-fill"></div></div><span class="fc-count" id="fc-count"></span></div>
  <div class="card-wrap" id="card-wrap" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front" id="card-front"></div>
      <div class="card-face card-back" id="card-back"></div>
    </div>
  </div>
  <div class="fc-btns">
    <button class="fc-btn fc-shuffle" onclick="shuffleCards()">Mélanger</button>
    <button class="fc-btn fc-prev" onclick="prevCard()">← Préc.</button>
    <button class="fc-btn fc-next" onclick="nextCard()">Suiv. →</button>
  </div>
</div>

<!-- ═══════ VIEW: QUIZ ═══════ -->
<div class="view" id="v-quiz">
  <div id="quiz-container"></div>
</div>

<!-- ═══════ VIEW: MÉTHODE ═══════ -->
<div class="view" id="v-method">
  <div class="method-tabs" id="method-tabs"></div>
  <div id="method-content"></div>
</div>

<!-- ═══════ VIEW: SUJETS CORRIGÉS ═══════ -->
<div class="view" id="v-sujets">
  <div id="sujets-container"></div>
</div>
</div>

<script>
/* ══════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════ */
const tabs=[
  {id:'v-flash',label:'Flashcards',icon:'🃏'},
  {id:'v-quiz',label:'Quiz',icon:'🧠'},
  {id:'v-method',label:'Méthode',icon:'✍️'},
  {id:'v-sujets',label:'Corrigés',icon:'📝'}
];
const nav=document.getElementById('nav');
tabs.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='nav-btn'+(i===0?' on':'');
  b.textContent=t.icon+' '+t.label;
  b.onclick=()=>{
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
    document.getElementById(t.id).classList.add('on');
  };
  nav.appendChild(b);
});

/* ══════════════════════════════════════
   FLASHCARDS DATA
   ══════════════════════════════════════ */
const flashcards=[
{notion:"Liberté",a:"Sartre",w:"L'existentialisme est un humanisme",c:"L'homme est condamné à être libre.",t:"Même en situation de contrainte, l'homme choisit son attitude. La liberté est ontologique, on ne peut pas y échapper.",fg:"var(--purple)",bg:"var(--purple2)"},
{notion:"Liberté",a:"Épictète",w:"Manuel",c:"Ce qui dépend de nous est libre par nature.",t:"Distinguer ce qui dépend de nous (jugement, volonté) et ce qui n'en dépend pas (corps, fortune). La liberté intérieure est inaliénable.",fg:"var(--purple)",bg:"var(--purple2)"},
{notion:"Liberté",a:"Spinoza",w:"Éthique",c:"Les hommes se croient libres parce qu'ils ignorent les causes qui les déterminent.",t:"La liberté n'est pas l'absence de contrainte mais la compréhension de la nécessité. Le libre arbitre est une illusion.",fg:"var(--purple)",bg:"var(--purple2)"},
{notion:"Liberté",a:"Rousseau",w:"Du contrat social",c:"L'obéissance à la loi qu'on s'est prescrite est liberté.",t:"La liberté civile > la liberté naturelle. Le contrat social transforme la soumission en autonomie collective.",fg:"var(--purple)",bg:"var(--purple2)"},
{notion:"Liberté",a:"Kant",w:"Fondements de la métaphysique des mœurs",c:"Agis selon la maxime que tu voudrais voir érigée en loi universelle.",t:"L'autonomie morale : être libre c'est obéir à la loi que la raison se donne. Liberté = autonomie, pas caprice.",fg:"var(--purple)",bg:"var(--purple2)"},
{notion:"Justice",a:"Rawls",w:"Théorie de la justice",c:"L'injustice n'est tolérable que pour éviter une injustice plus grande.",t:"Le voile d'ignorance : une société juste est celle qu'on accepterait sans connaître sa position sociale.",fg:"var(--teal)",bg:"var(--teal2)"},
{notion:"Justice",a:"Thoreau",w:"La désobéissance civile",c:"Sous un gouvernement qui emprisonne injustement, la place d'un homme juste est en prison.",t:"Devoir moral de désobéir quand la loi est immorale. L'individu est le juge ultime de la loi.",fg:"var(--teal)",bg:"var(--teal2)"},
{notion:"Justice",a:"Platon",w:"Criton",c:"Il ne faut jamais commettre l'injustice, même en réponse à l'injustice.",t:"Socrate refuse de fuir sa condamnation : désobéir détruirait le pacte social qui nous lie tous.",fg:"var(--teal)",bg:"var(--teal2)"},
{notion:"Art",a:"Kant",w:"Critique de la faculté de juger",c:"Le génie est le talent qui donne les règles à l'art.",t:"Le beau plaît sans concept. Le génie crée des règles nouvelles sans les suivre mécaniquement.",fg:"var(--coral)",bg:"var(--coral2)"},
{notion:"Art",a:"Hegel",w:"Esthétique",c:"L'art est la manifestation sensible de l'idée.",t:"L'art est une forme de connaissance : il révèle l'esprit à lui-même à travers la matière sensible.",fg:"var(--coral)",bg:"var(--coral2)"},
{notion:"Art",a:"Nietzsche",w:"Humain, trop humain",c:"L'art nous est donné pour ne pas mourir de la vérité.",t:"L'art n'est pas inspiration divine mais travail acharné. Tous les grands hommes sont de grands travailleurs.",fg:"var(--coral)",bg:"var(--coral2)"},
{notion:"Art",a:"Aristote",w:"Poétique",c:"L'art est mimèsis.",t:"L'art est imitation créatrice du réel. La catharsis : le spectacle tragique purge les passions du spectateur.",fg:"var(--coral)",bg:"var(--coral2)"},
{notion:"Nature",a:"Rousseau",w:"Discours sur l'inégalité",c:"L'homme est né libre, et partout il est dans les fers.",t:"L'état de nature = bonheur et innocence. C'est la civilisation qui corrompt l'homme, pas la nature.",fg:"var(--ok)",bg:"var(--ok2)"},
{notion:"Nature",a:"Jonas",w:"Le principe responsabilité",c:"Agis de sorte que les effets de ton action soient compatibles avec la permanence d'une vie humaine sur Terre.",t:"La technique moderne crée des effets irréversibles. Nous avons un devoir envers les générations futures.",fg:"var(--ok)",bg:"var(--ok2)"},
{notion:"Nature",a:"Descartes",w:"Discours de la méthode",c:"Nous rendre comme maîtres et possesseurs de la nature.",t:"La science et la technique doivent soumettre la nature au service du bien-être humain.",fg:"var(--ok)",bg:"var(--ok2)"},
{notion:"Technique",a:"Marx",w:"Manuscrits de 1844",c:"Le travail aliéné fait de l'activité vitale un simple moyen d'existence.",t:"L'ouvrier ne se reconnaît pas dans son produit. Le travail capitaliste dépossède l'homme de son humanité.",fg:"var(--blue)",bg:"var(--blue2)"},
{notion:"Technique",a:"Ellul",w:"Le système technicien",c:"Ce n'est plus l'homme qui choisit la technique, c'est la technique qui choisit l'homme.",t:"La technique est devenue un système autonome qui échappe au contrôle humain et s'impose comme une fatalité.",fg:"var(--blue)",bg:"var(--blue2)"},
{notion:"Technique",a:"Hegel",w:"Phénoménologie de l'esprit",c:"C'est par le travail que la conscience parvient à elle-même.",t:"Dialectique maître/esclave : l'esclave, par le travail, transforme la nature et accède à la conscience de soi.",fg:"var(--blue)",bg:"var(--blue2)"},
{notion:"Vérité",a:"Descartes",w:"Méditations métaphysiques",c:"Je pense, donc je suis.",t:"Le doute méthodique : ne tenir pour vrai que ce qui est clair et distinct. Le Cogito = première vérité indubitable.",fg:"var(--blue)",bg:"var(--blue2)"},
{notion:"Vérité",a:"Platon",w:"République VII",c:"Allégorie de la caverne",t:"Sortir de la caverne = accéder à la vérité par un effort douloureux de libération des apparences et de l'opinion.",fg:"var(--blue)",bg:"var(--blue2)"},
{notion:"Société",a:"Aristote",w:"Politique",c:"L'homme est par nature un animal politique.",t:"Vivre en société est naturel. L'homme ne s'accomplit pleinement que dans la cité, par la parole et l'action.",fg:"var(--pink)",bg:"var(--pink2)"},
{notion:"Société",a:"Hobbes",w:"Léviathan",c:"L'homme est un loup pour l'homme.",t:"L'état de nature = guerre de tous contre tous. Le contrat social crée l'État pour garantir la sécurité.",fg:"var(--pink)",bg:"var(--pink2)"},
{notion:"Bonheur",a:"Aristote",w:"Éthique à Nicomaque",c:"Le bonheur est le souverain bien.",t:"L'eudaimonia est la fin ultime de toute action humaine. Il s'atteint par la vertu et l'activité de l'âme conforme à la raison.",fg:"var(--pink)",bg:"var(--pink2)"},
{notion:"Bonheur",a:"Épicure",w:"Lettre à Ménécée",c:"La mort n'est rien pour nous.",t:"Le bonheur = ataraxie (absence de trouble). Satisfaire les désirs naturels et nécessaires suffit.",fg:"var(--pink)",bg:"var(--pink2)"},
{notion:"Échanges",a:"Smith",w:"Richesse des nations",c:"Ce n'est pas de la bienveillance du boucher que nous attendons notre dîner, mais du soin qu'il apporte à ses intérêts.",t:"L'échange marchand repose sur l'intérêt personnel, pas sur la générosité. Le marché crée un ordre spontané.",fg:"var(--pink)",bg:"var(--pink2)"},
{notion:"Échanges",a:"Mauss",w:"Essai sur le don",c:"Donner, recevoir, rendre.",t:"L'échange n'est pas que marchand. Le don crée du lien social, il oblige réciproquement et fonde la société.",fg:"var(--pink)",bg:"var(--pink2)"},

let fcFilter='Tous',fcIdx=0,fcDeck=[...flashcards];
const notionSet=[...new Set(flashcards.map(f=>f.notion))];

function buildFilters(){
  const el=document.getElementById('fc-filters');
  el.innerHTML='';
  ['Tous',...notionSet].forEach(n=>{
    const b=document.createElement('button');
    b.className='fc-ftag'+(n===fcFilter?' on':'');
    b.textContent=n;
    b.onclick=()=>{fcFilter=n;fcIdx=0;filterDeck();buildFilters();renderCard()};
    el.appendChild(b);
  });
}
function filterDeck(){
  fcDeck=fcFilter==='Tous'?[...flashcards]:flashcards.filter(f=>f.notion===fcFilter);
}
function shuffleCards(){fcDeck.sort(()=>Math.random()-.5);fcIdx=0;renderCard()}
function flipCard(){document.getElementById('card-wrap').classList.toggle('flipped')}
function nextCard(){if(fcIdx<fcDeck.length-1){fcIdx++;renderCard()}}
function prevCard(){if(fcIdx>0){fcIdx--;renderCard()}}
function renderCard(){
  const wrap=document.getElementById('card-wrap');
  wrap.classList.remove('flipped');
  const f=fcDeck[fcIdx];if(!f)return;
  document.getElementById('fc-fill').style.width=((fcIdx+1)/fcDeck.length*100)+'%';
  document.getElementById('fc-count').textContent=(fcIdx+1)+'/'+fcDeck.length;
  document.getElementById('card-front').innerHTML=`
    <div class="card-label" style="color:var(--t3)">Auteur</div>
    <div class="card-notion" style="background:${f.bg};color:${f.fg}">${f.notion}</div>
    <div class="card-author">${f.a}</div>
    <div class="card-work">${f.w}</div>
    <div class="card-hint">Touche pour révéler →</div>`;
  document.getElementById('card-back').innerHTML=`
    <div class="card-label" style="color:var(--acc)">Citation & Thèse</div>
    <div class="card-notion" style="background:${f.bg};color:${f.fg}">${f.notion}</div>
    <div class="card-cite">« ${f.c} »</div>
    <div class="card-these">${f.t}</div>`;
}
buildFilters();filterDeck();renderCard();

let qIdx=0,score=0,answered=false;
function renderQuizIntro(){
  document.getElementById('quiz-container').innerHTML=`
    <div class="quiz-intro">
      <h2>Teste tes connaissances</h2>
      <p>30 questions sur les notions, auteurs, citations et 10 ans de sujets du bac. Prêt ?</p>
      <button class="quiz-start" onclick="startQuiz()">Commencer le quiz</button>
    </div>`;
}
function startQuiz(){qIdx=0;score=0;quizData.sort(()=>Math.random()-.5);renderQ()}
function renderQ(){
  if(qIdx>=quizData.length){renderScore();return}
  answered=false;
  const q=quizData[qIdx];
  const el=document.getElementById('quiz-container');
  el.innerHTML=`
    <div class="q-card">
      <div class="q-num">Question ${qIdx+1}/${quizData.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts" id="q-opts">${q.opts.map((o,i)=>`<button class="q-opt" data-i="${i}" onclick="answerQ(${i})">${o}</button>`).join('')}</div>
      <div class="q-explain" id="q-exp">${q.exp}</div>
      <button class="q-next" id="q-next" onclick="qIdx++;renderQ()">Question suivante →</button>
    </div>`;
}
function answerQ(i){
  if(answered)return;answered=true;
  const q=quizData[qIdx];
  const btns=document.querySelectorAll('.q-opt');
  btns.forEach((b,j)=>{
    if(j===q.ans)b.classList.add('correct');
    else if(j===i&&i!==q.ans)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(i===q.ans)score++;
  document.getElementById('q-exp').classList.add('show');
  document.getElementById('q-next').classList.add('show');
}
function renderScore(){
  const pct=Math.round(score/quizData.length*100);
  let msg,detail;
  if(pct>=80){msg="Excellent !";detail="Tu maîtrises bien les notions et les auteurs. Continue comme ça."}
  else if(pct>=60){msg="Bien joué !";detail="De bonnes bases, mais revois les fiches des notions où tu as hésité."}
  else if(pct>=40){msg="Pas mal, mais…";detail="Reprends les flashcards et concentre-toi sur les auteurs et citations à connaître."}
  else{msg="À retravailler";detail="Pas de panique ! Relis les fiches notion par notion, puis refais le quiz."}
  document.getElementById('quiz-container').innerHTML=`
    <div class="quiz-score">
      <div class="score-circle"><div class="score-num">${score}/${quizData.length}</div><div class="score-label">${pct}%</div></div>
      <div class="score-msg">${msg}</div>
      <div class="score-detail">${detail}</div>
      <button class="quiz-start" onclick="startQuiz()">Recommencer</button>
    </div>`;
}
renderQuizIntro();

const methodSections=[
{id:'intro',label:"L'introduction",content:`
<div class="m-card">
  <div class="m-tag" style="background:var(--teal2);color:var(--teal)">4 étapes — 15 minutes</div>
  <div class="m-step"><div class="m-dot m-dot-1">1</div><div class="m-body"><h4>L'accroche</h4><p>Un fait, une citation ou une situation concrète qui amène naturellement le sujet. Pas de « depuis la nuit des temps ».</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-2">2</div><div class="m-body"><h4>Définition des termes</h4><p>Définis chaque mot important du sujet. C'est là que tu montres que tu as compris la question.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-3">3</div><div class="m-body"><h4>La problématique</h4><p>Reformule le sujet en une question précise qui montre la tension, le paradoxe. Ce n'est PAS une paraphrase du sujet.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-4">4</div><div class="m-body"><h4>Annonce du plan</h4><p>Présente les 3 moments de ta réflexion en une ou deux phrases. Pas de « dans un premier temps… ».</p></div></div>
</div>
<div class="m-example"><b>Exemple</b> — Sujet : « Sommes-nous libres en toutes circonstances ? »<br><br><b>Accroche :</b> Un prisonnier qui choisit de résister mentalement à ses geôliers exerce-t-il encore sa liberté ?<br><br><b>Définitions :</b> « Libres » = capacité d'agir selon sa volonté, sans contrainte. « En toutes circonstances » = même face à des obstacles physiques, sociaux, psychologiques.<br><br><b>Problématique :</b> La liberté humaine est-elle une donnée permanente de notre condition, ou dépend-elle des conditions extérieures dans lesquelles nous nous trouvons ?<br><br><b>Plan :</b> Nous verrons d'abord que la liberté semble constitutive de l'être humain, puis que des déterminismes la limitent, avant de montrer que la liberté véritable se situe peut-être dans la conscience que nous prenons de ces limites.</div>
<div class="m-warn">⚠ Piège classique : ne jamais commencer par « De tout temps, l'homme s'est interrogé sur… ». C'est un cliché repéré par tous les correcteurs.</div>

{id:'plan',label:'Le plan',content:`
<div class="m-card">
  <div class="m-tag" style="background:var(--coral2);color:var(--coral)">Structure dialectique</div>
  <div class="m-step"><div class="m-dot m-dot-1">I</div><div class="m-body"><h4>Thèse — La réponse qui semble évidente</h4><p>C'est le « oui » spontané (ou le « non »). Tu défends une première position avec un argument + un auteur + un exemple concret.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-2">II</div><div class="m-body"><h4>Antithèse — L'objection</h4><p>Tu montres les limites de la thèse. Un autre auteur qui s'oppose, un contre-exemple. Tu ne te contredis pas : tu approfondis.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-3">III</div><div class="m-body"><h4>Dépassement — La synthèse</h4><p>Tu dépasses l'opposition. Tu reformules le problème. C'est la partie la plus valorisée par les correcteurs.</p></div></div>
</div>
<div class="m-card">
  <div class="m-tag" style="background:var(--acc2);color:var(--acc)">Anatomie d'une partie</div>
  <div class="m-step"><div class="m-dot m-dot-1">A</div><div class="m-body"><h4>Argument</h4><p>Une idée claire, formulée en une phrase. C'est la colonne vertébrale de ta partie.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-2">B</div><div class="m-body"><h4>Référence philosophique</h4><p>Un auteur + le titre de l'œuvre + sa thèse résumée en 1-2 phrases. Ne récite pas le cours : explique pourquoi cet auteur éclaire le sujet.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-3">C</div><div class="m-body"><h4>Exemple concret</h4><p>Un fait historique, une œuvre d'art, une expérience quotidienne. L'exemple illustre, il ne remplace pas l'argument.</p></div></div>
  <div class="m-step"><div class="m-dot m-dot-4">D</div><div class="m-body"><h4>Transition</h4><p>1-2 phrases qui montrent la limite de ce que tu viens de dire et annoncent la suite. C'est ce qui fait la différence entre un 10 et un 14.</p></div></div>
</div>

const sc=document.getElementById('sujets-container');
let openSuj=-1;
function renderSujets(){
  sc.innerHTML='<div class="suj-list" id="suj-list"></div><div id="suj-detail-wrap"></div>';
  const list=document.getElementById('suj-list');
  sujets.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='suj-item'+(i===openSuj?' on':'');
    d.innerHTML=`<div class="suj-year">${s.year} — Métropole</div><div class="suj-title">${s.title}</div>`;
    d.onclick=()=>{openSuj=openSuj===i?-1:i;renderSujets()};
    list.appendChild(d);
  });
  if(openSuj>=0)renderSujDetail(sujets[openSuj]);
}
function renderSujDetail(s){
  const w=document.getElementById('suj-detail-wrap');
  let html=`<div class="suj-detail on">`;
  html+=`<div class="suj-section"><h3>Introduction rédigée</h3><div class="suj-intro-ex">${s.intro}</div></div>`;
  html+=`<div class="suj-section"><h3>Développement</h3>`;
  s.parts.forEach((p,i)=>{
    html+=`<div class="suj-part sp${i+1}"><div class="suj-part-title"><span class="suj-part-num">${p.n}</span>${p.title}</div><p>${p.body}</p><div class="ref">📚 ${p.ref}</div>${p.transition?'<div class="m-example" style="margin-top:10px"><b>Transition :</b> '+p.transition+'</div>':''}</div>`;
  });
  html+=`</div>`;
  html+=`<div class="suj-section"><h3>Conclusion rédigée</h3><div class="suj-ccl-ex">${s.conclusion}</div></div>`;
  html+=`</div>`;
  w.innerHTML=html;
}
